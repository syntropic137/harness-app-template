name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'ws_apps/docs/**'
  workflow_dispatch:

# Least-privilege default. Only the deploy job needs Pages write + the OIDC
# id-token; it declares them at the job level. The build job just reads.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @harness/docs build
        env:
          GITHUB_PAGES: 'true'
      - run: touch ws_apps/docs/out/.nojekyll
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ws_apps/docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Write scopes live here, not at the workflow level: only this job
    # publishes to Pages, and it does so via OIDC (id-token) rather than a
    # long-lived secret.
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
