name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workspace-qa:
    name: workspace qa (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm qa

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test:coverage

  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just cov-rust

  fitness:
    # APSS 8-dimension architectural fitness gate (bead
    # create-harness-app-2zz). Mirrors the lefthook pre-push sensors-gate
    # so a fork that bypasses local hooks still gets blocked on regression
    # at PR time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install sensors slot deps (ts-morph)
        working-directory: harness/sensors
        run: npm install --no-package-lock --no-audit --no-fund --silent
      - name: Run APSS fitness gate
        run: harness/sensors/bin/sensors gate
      - name: Run perf fitness gate
        run: harness/perf/bench.sh | node harness/perf/gate.mjs
