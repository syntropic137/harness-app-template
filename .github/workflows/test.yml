name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workspace-qa:
    name: workspace qa (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Install gitleaks so the secret-scan gate inside `pnpm qa`
      # (scripts/qa.ts) runs for real in CI. The gate is fail-closed
      # (see ADR-0009-secret-scanner.md); without this step the QA job
      # would abort on the install-hint path instead of actually
      # scanning. taiki-e/install-action does NOT ship gitleaks and
      # its cargo-binstall fallback also fails (gitleaks is not a
      # crate), so we install via direct binary download with a pinned
      # checksum — see .github/scripts/install-gitleaks.sh for the
      # version + SHA-256 table.
      - name: Install gitleaks (pinned + checksum-verified)
        run: bash .github/scripts/install-gitleaks.sh
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm qa

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test:coverage

  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just cov-rust

  python-coverage:
    # mypy --strict + pytest --cov-fail-under=100 for ws_apps/example-python.
    # Mirrors the lefthook pre-commit python-mypy and pre-push cov-py so a
    # fork that bypasses local hooks still hits the gate at PR time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: uv sync --project ws_apps/example-python
      - run: sh scripts/with-uv.sh uv run mypy src
        working-directory: ws_apps/example-python
      - run: just cov-py

  documentation:
    # APSS APS-V1-0003 documentation gate. Validates documentation
    # against APSS standard (topology standard contract, ADRs, front-matter,
    # README/Index per-directory requirements). Hard-enforcing gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - run: pnpm install --no-frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache APSS binary
        id: cache-apss
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/apss
          key: apss-1.1.0-${{ runner.os }}
      - name: Install APSS
        if: steps.cache-apss.outputs.cache-hit != 'true'
        run: cargo install apss --version 1.1.0
      - name: Cache composed APSS CLI
        id: cache-apss-composed
        uses: actions/cache@v4
        with:
          path: .apss
          key: apss-composed-${{ runner.os }}-${{ hashFiles('apss.lock') }}
      - name: Compose project APSS CLI
        if: steps.cache-apss-composed.outputs.cache-hit != 'true'
        run: apss install
      - name: Run APSS documentation validator
        run: node scripts/doc-validator.mjs --apss

  fitness:
    # APSS 9-dimension architectural fitness gate (bead
    # create-harness-app-2zz, extended by ADR-0025 for CV01 coverage).
    # Mirrors the lefthook pre-push sensors-gate so a fork that bypasses
    # local hooks still gets blocked on regression at PR time. Installs
    # the APSS code-topology producer so the gate consumes real
    # .topology/metrics/*.json (closed loop) instead of silently
    # degrading to apss-topology: available=false. Also produces the
    # three coverage envelopes that feed the CV01 ratchet by running
    # cargo-llvm-cov, pytest-cov, and vitest with json/json-summary
    # reporters BEFORE the gate; the gate reads them via the
    # SENSORS_COVERAGE_*_JSON env contract. Coverage is byte-identical
    # local vs CI because CARGO_TARGET_DIR is pinned to a workspace-
    # relative path (worktree isolation) and the same flags drive the
    # adapter on both sides.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Cache APSS binary
        id: cache-apss
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/apss
          key: apss-1.1.0-${{ runner.os }}
      - name: Install APSS
        if: steps.cache-apss.outputs.cache-hit != 'true'
        run: cargo install apss --version 1.1.0
      - name: Cache composed APSS CLI
        id: cache-apss-composed
        uses: actions/cache@v4
        with:
          path: .apss
          key: apss-composed-${{ runner.os }}-${{ hashFiles('apss.lock') }}
      - name: Compose project APSS CLI
        if: steps.cache-apss-composed.outputs.cache-hit != 'true'
        run: apss install
      - name: Install sensors slot deps (ts-morph)
        working-directory: harness/sensors
        run: npm install --no-package-lock --no-audit --no-fund --silent
      - name: Install sentrux (activates 2nd architectural lens in gate)
        # Without sentrux on PATH, harness/sensors/sentrux_scan.mjs
        # soft-skips and sentrux-* baseline floors silently stop
        # gating — exactly the drift this branch was opened to fix.
        run: bash .github/scripts/install-sentrux.sh
      - name: Install root deps for vitest coverage
        run: pnpm install --no-frozen-lockfile
      - name: Prepare CV01 Python coverage envelope (pytest --cov-report=json)
        # `with-uv.sh` lives at ws_apps/example-python/scripts/, NOT at
        # the repo root. After `cd ws_apps/example-python` the correct
        # relative path is `scripts/with-uv.sh`, matching the existing
        # python-coverage job (working-directory ws_apps/example-python +
        # `sh scripts/with-uv.sh ...`) and the `just cov-py` recipe.
        run: |
          mkdir -p /tmp/cov
          uv sync --project ws_apps/example-python
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run pytest \
            --cov=example_python \
            --cov-report=json:/tmp/cov/python.json \
            --cov-fail-under=100 \
            --ignore=tests/integration -q
      - name: Prepare CV01 JavaScript coverage envelope (vitest --coverage.reporter=json-summary)
        run: |
          pnpm exec vitest run scripts/tests \
            --coverage \
            --coverage.reporter=json-summary \
            --coverage.reportsDirectory=/tmp/cov/js
      - name: Run APSS fitness gate (with CV01 coverage envelope)
        # The gate's coverage_scan invocation aggregates three lanes:
        #   - Rust: live run via SENSORS_COVERAGE_RUST_RUN=1; the
        #     adapter shells out to cargo-llvm-cov per crate with the
        #     SAME flags `just cov-rust` uses (RUST_LANES table), and
        #     pins CARGO_TARGET_DIR to a worktree-local isolated path
        #     so concurrent runs cannot corrupt profraw files.
        #   - Python: pre-rendered pytest-cov JSON from the step above.
        #   - JavaScript: pre-rendered vitest coverage-summary.json
        #     from the step above (root scripts/ project; per-app
        #     vitest configs already enforce 100 percent thresholds in
        #     the scripts CI job).
        env:
          SENSORS_COVERAGE: '1'
          SENSORS_COVERAGE_RUST_RUN: '1'
          SENSORS_COVERAGE_PYTHON_JSON: /tmp/cov/python.json
          SENSORS_COVERAGE_JS_JSON: /tmp/cov/js/coverage-summary.json
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/coverage-isolated-ci
        run: harness/sensors/bin/sensors gate
      - name: Run perf fitness gate
        run: harness/perf/bench.sh | node harness/perf/gate.mjs

  dep-audit:
    # Polyglot dependency / supply-chain CVE audit (ADR-0023). Mirrors
    # the local `just dep-audit` recipe, with the tooling required for
    # each lane installed inline (pnpm + node, cargo + cargo-audit, uv).
    # Fails CLOSED: a missing tool means no scan, which means a known
    # vulnerable dep could slip through. Tier: CI only — the round-trip
    # to the npm / RustSec / PyPA advisory DBs dominates wall clock and
    # is not worth blocking the inner loop on.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: pnpm install --no-frozen-lockfile
      - run: just dep-audit

  fork-check:
    # End-to-end fork-readiness check. Snapshots HEAD into a clean temp
    # workspace, runs the documented `just init <name>` + `just bootstrap`
    # consumer flow, then executes the full gate suite (qa, sensors gate,
    # fitness summary) against the post-init tree. Catches "works in
    # template repo but breaks on fresh fork" regressions that the
    # in-repo CI jobs above can never see (e.g. uv workspace member
    # collisions after rename, cold-cache CLI budgets, baseline paths
    # tied to seed names). Doc-validator is skipped here because the
    # `documentation` job above already exercises apss against the
    # template tree.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # Fresh-fork qa runs the fail-closed secret-scan gate, so the
      # forked checkout needs gitleaks on PATH for `pnpm qa` to pass.
      # Direct binary install (taiki-e/install-action does not support
      # gitleaks); see .github/scripts/install-gitleaks.sh.
      - name: Install gitleaks (pinned + checksum-verified)
        run: bash .github/scripts/install-gitleaks.sh
      - name: Cache APSS binary
        id: cache-apss
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/apss
          key: apss-1.1.0-${{ runner.os }}
      - name: Install APSS
        if: steps.cache-apss.outputs.cache-hit != 'true'
        run: cargo install apss --version 1.1.0
      - name: Install sensors slot deps for source-tree sensors invocations
        working-directory: harness/sensors
        run: npm install --no-package-lock --no-audit --no-fund --silent
      - name: Install sentrux (matches local adopter PATH)
        # Mirrors the fitness job: without sentrux, the fork-check
        # qa/sensors run skips the 2nd architectural lens and lets
        # sentrux-* baseline regressions through, breaking adopters
        # who install sentrux per harness/sensors/README.md.
        run: bash .github/scripts/install-sentrux.sh
      - name: Configure git author for the snapshot commit
        run: |
          git config --global user.email fork-check@github
          git config --global user.name fork-check
      - name: Run fork-readiness E2E
        env:
          FORK_CHECK_SKIP_DOC: '1'
          FORK_CHECK_FITNESS: quick
        run: just fork-check
