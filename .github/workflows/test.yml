name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec vitest run scripts/tests --coverage
