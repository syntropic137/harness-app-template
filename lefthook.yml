# Fast, diff-scoped hooks only. Do not replace these with full-repo sweeps.
# `scripts/init.ts` installs lefthook into .git/hooks and chains any global
# attribution prepare-commit-msg hook configured through core.hooksPath.

skip_output:
  - meta
  - skips

pre-commit:
  parallel: true
  commands:
    biome-format-lint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,css,scss,md,yml,yaml}"
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping biome format/lint hook" >&2
            exit 0
          fi
          pnpm exec biome check --write --files-ignore-unknown=true --no-errors-on-unmatched "$@"
        ' -- {staged_files}
      stage_fixed: true

    secret-scan:
      # Security gate (ADR-0009-secret-scanner.md). Unlike the other
      # soft-skipping hooks in this file, this one fails CLOSED: a
      # missing scanner means no scan, which means a leaked secret can
      # slip through unobserved. Gitleaks is a single 6 MB Go binary
      # with zero language-runtime deps, so the install hint below is
      # the entire bootstrap cost. Scoped to `{staged_files}` via
      # `gitleaks protect --staged` to keep the inner loop sub-second.
      run: |
        sh -eu -c '
          if ! command -v gitleaks >/dev/null 2>&1; then
            printf "%s\n" "error: gitleaks is required for the staged secret-scan gate but is not on PATH." >&2
            printf "%s\n" "  Install:  brew install gitleaks  (macOS)" >&2
            printf "%s\n" "            apt install gitleaks   (Debian/Ubuntu)" >&2
            printf "%s\n" "            https://github.com/gitleaks/gitleaks/releases  (single binary)" >&2
            printf "%s\n" "  Rationale: docs/adrs/ADR-0009-secret-scanner.md" >&2
            exit 1
          fi
          gitleaks protect --staged --redact --no-banner
        '

    doc-validator:
      glob: "*.{md,json}"
      # See pre-push doc-validator for the --exclude rationale.
      run: harness/doc-validator/bin/doc-validator --exclude /.git/ --exclude /.beads/ --exclude /.ntm/ --exclude /node_modules/ --exclude /target/ --exclude harness/doc-validator/target --exclude ws_apps/docs/out --exclude docs/harness-engineering/references/ .

    doc-validator-apss:
      # APSS APS-V1-0003 documentation gate (ADR-0018: augment, never
      # replace). Hard-enforcing gate that validates documentation
      # against APSS standard (topology standard contract, front-matter,
      # README/Index per-directory requirements).
      run: |
        sh -eu -c '
          if ! command -v node >/dev/null 2>&1; then
            printf "%s\n" "error: node not found; APSS documentation gate requires node" >&2
            exit 1
          fi
          node scripts/doc-validator.mjs --apss
        '

    python-ruff:
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run ruff check .
        '

    python-mypy:
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run mypy src
        '

    ubs-staged:
      run: mkdir -p .beads && ubs --staged --fail-on-error --beads-jsonl .beads/ubs-findings.jsonl

    fitness-summary:
      # Agent-facing fitness one-liner (bead
      # create-harness-app-feat-fitness-feedback-report). Reads
      # harness/sensors/baseline.json (no scan, no full pipeline) and
      # prints a one-line floor summary so any coding agent sees the
      # ratchet targets in pre-commit output. Always exits 0 - this is
      # a READ-ONLY surface; the cx-gate / sensors-gate own the actual
      # gating decision. Soft-skips when node is absent so first-clone
      # commits still go through.
      run: |
        sh -eu -c '
          if ! command -v node >/dev/null 2>&1; then
            printf "%s\n" "warning: node not found; skipping fitness-summary hook" >&2
            exit 0
          fi
          node harness/sensors/fitness_report.mjs --quick --format=summary || true
          printf "%s\n" "(run \`just fitness\` for the full live report; AT-RISK metrics are one regression from failing the ratchet)"
        '

    cx-gate:
      # Fast complexity-only ratchet (bead create-harness-app-cxgate).
      # Stripped-down sibling of the full sensors-gate: just
      # harness/sensors/complexity.mjs vs. the MT01 floors in
      # harness/sensors/baseline.json (max-cognitive, max-cyclomatic,
      # high-cognitive-fn-count). ~0.4 s scan + ~1 s Node/ts-morph
      # startup; full sensors-gate is ~108 s, so this is the inner-loop
      # signal that catches complexity regressions before push, while
      # the canonical ratchet authority stays in CI (.github/
      # workflows/test.yml -> `fitness` job) and in `just sensors gate`.
      # Glob-gated to TS sources so non-TS commits skip instantly.
      # Soft-skips when node is absent so first-clone state stays
      # bootable.
      glob: "{ws_apps,ws_packages}/**/*.{ts,tsx}"
      run: |
        sh -eu -c '
          if ! command -v node >/dev/null 2>&1; then
            printf "%s\n" "warning: node not found; skipping fast complexity gate" >&2
            exit 0
          fi
          node harness/sensors/cx_gate.mjs
        '

    python-ruff-format:
      # Auto-formatting member of the formatter slot
      # (ADR-0021-formatter-slot.md). Mirrors biome-format-lint's
      # write-then-restage posture: only the staged .py files under
      # ws_apps/example-python are rewritten in place, and
      # `stage_fixed: true` re-adds them so the resulting commit
      # already passes `ruff format --check`. Safe to enforce because
      # the operation is purely whitespace-equivalent — the same
      # reason biome-format-lint is enforced. The formatter slot is
      # swappable via harness.manifest.json (`slots.formatter`);
      # replace this command if you swap ruff for another formatter.
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run ruff format "$@"
        ' -- {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck-affected:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping affected typecheck hook" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          pnpm turbo run typecheck --filter="...[$base]"
        '

    test-affected:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping affected test hook" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          pnpm turbo run test --filter="...[$base]"
        '

    cov-ts:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping TypeScript workspace coverage hook" >&2
            exit 0
          fi
          pnpm test:coverage
        '

    cov-rust:
      # Rust llvm-cov gate for template Rust surfaces. The hook soft-skips
      # when cargo-llvm-cov is absent locally; CI installs the tool and runs
      # the same `just cov-rust` recipe as the hard gate.
      run: |
        sh -eu -c '
          if ! command -v cargo >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo-llvm-cov not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          if ! command -v just >/dev/null 2>&1; then
            printf "%s\n" "warning: just not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          just cov-rust
        '

    cov-py:
      # Python pytest-cov gate for ws_apps/example-python. The package keeps
      # its 100 percent threshold in pyproject.toml; this hook soft-skips
      # when uv is missing so first-clone pushes fail only once the Python
      # toolchain is present.
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run pytest
        '

    doc-validator:
      # Excludes (re-listing the validator defaults explicitly because
      # passing --exclude REPLACES the default list rather than adding
      # to it):
      #   - /.git/ /.beads/ /.ntm/ /node_modules/ /target/
      #     harness/doc-validator/target ws_apps/docs/out: vendor + state
      #     paths the validator's own default-list skips.
      #   - docs/harness-engineering/references/: vendored extractive
      #     summaries from neural-hermes-data carry footnote-style
      #     anchors (#footnote-N, #footnote-ref-N-N) the validator does
      #     not yet understand. Preservation-first: the content is
      #     intentionally verbatim, so scope the gate around it rather
      #     than rewriting the vendored material.
      run: harness/doc-validator/bin/doc-validator --exclude /.git/ --exclude /.beads/ --exclude /.ntm/ --exclude /node_modules/ --exclude /target/ --exclude harness/doc-validator/target --exclude ws_apps/docs/out --exclude docs/harness-engineering/references/ .

    doc-validator-apss:
      # APSS APS-V1-0003 documentation gate (ADR-0018: augment, never
      # replace). Hard-enforcing gate that validates documentation
      # against APSS standard (topology standard contract, front-matter,
      # README/Index per-directory requirements).
      run: |
        sh -eu -c '
          if ! command -v node >/dev/null 2>&1; then
            printf "%s\n" "error: node not found; APSS documentation gate requires node" >&2
            exit 1
          fi
          node scripts/doc-validator.mjs --apss
        '

    dep-audit-lockfile:
      # Fast lockfile-integrity check (ADR-0023-dependency-audit.md).
      # Inner-loop sibling of the CI dep-audit gate: verifies each
      # present, committed lockfile is consistent with its manifest
      # WITHOUT going to the network. The heavy CVE audit lives in the
      # `dep-audit` CI job because npm / RustSec / PyPA round-trips are
      # too slow to enforce at pre-push. Posture per lane:
      #   - lockfile missing: this template intentionally gitignores
      #     pnpm-lock.yaml and Cargo.lock (consumers regenerate on
      #     `just init`), so a fresh-clone push has nothing to verify.
      #     uv.lock IS committed and gets the integrity check.
      #   - tooling missing: pre-push is an inner-loop ergonomics
      #     surface; the CI dep-audit gate is the authoritative
      #     fail-closed enforcement. Mismatched posture is intentional.
      # Rust lockfile integrity is intentionally absent: `cargo metadata
      # --locked --offline` needs the registry cache populated, which a
      # fresh-clone box does not have, and dropping --offline forces a
      # network round-trip that violates the "fast pre-push" tier.
      run: |
        sh -eu -c '
          rc=0
          if [ -f pnpm-lock.yaml ]; then
            if command -v pnpm >/dev/null 2>&1; then
              printf "dep-audit-lockfile[js]: pnpm install --frozen-lockfile --lockfile-only\n"
              pnpm install --frozen-lockfile --lockfile-only --reporter=silent || rc=$?
            else
              printf "warning: pnpm not found; skipping JS lockfile integrity\n" >&2
            fi
          fi
          if [ -f uv.lock ]; then
            if command -v uv >/dev/null 2>&1; then
              printf "dep-audit-lockfile[python]: uv lock --check\n"
              uv lock --check || rc=$?
            else
              printf "warning: uv not found; skipping Python lockfile integrity\n" >&2
            fi
          fi
          exit $rc
        '

    perf-gate:
      # Startup-time fitness function (bead create-harness-app-n48.13).
      # Runs hyperfine against ws_apps/example-typescript's cold-start
      # path and compares the mean against harness/perf/baseline.json.
      # Soft-skips when hyperfine is missing (bench.sh emits a no-op
      # JSON sentinel that the gate treats as "no benchmarks this run").
      run: harness/perf/bench.sh | node harness/perf/gate.mjs

    # sensors-gate (full ratchet) was moved out of pre-push in
    # ADR-0020 / bead create-harness-app-n48.4 placement work:
    # the full pipeline (dependency-cruiser + ts-morph + APSS topology
    # producer) takes ~108 s wall-clock and races on `.topology/`
    # regeneration when lefthook runs hooks in parallel with
    # `pnpm turbo run typecheck` / `pnpm test:coverage`, producing
    # spurious folder-instability regressions. The canonical ratchet
    # authority now lives in CI (.github/workflows/test.yml → `fitness`
    # job), which runs the same `harness/sensors/bin/sensors gate`
    # command serially on a clean checkout. Operators can still invoke
    # the full ratchet locally via `just sensors gate` whenever they
    # want a single-shot check; the pre-push path stays fast and
    # parallel-safe.

    versioning-release-check:
      # Mirrors the GitHub Actions versioning workflow. Uses the same
      # just release-check recipe, scoped to commits ahead of the
      # configured base ref, and soft-skips when the local versioning
      # toolchain is not present.
      run: |
        sh -eu -c '
          if ! command -v cargo >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo not found; skipping versioning release check" >&2
            exit 0
          fi
          if ! command -v bun >/dev/null 2>&1; then
            printf "%s\n" "warning: bun not found; skipping versioning release check" >&2
            exit 0
          fi
          if ! command -v just >/dev/null 2>&1; then
            printf "%s\n" "warning: just not found; skipping versioning release check" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf origin)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base=""
          if [ -n "$base" ]; then
            if [ "$(git rev-list --count "$base..HEAD")" -eq 0 ]; then
              printf "%s\n" "versioning release check: no commits ahead of $base"
              exit 0
            fi
            just release-check "$base" HEAD
          else
            just release-check
          fi
        '

    ubs-diff:
      run: |
        sh -eu -c '
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          mkdir -p .beads
          ubs --diff "$base" --fail-on-error --beads-jsonl .beads/ubs-findings.jsonl
        '
