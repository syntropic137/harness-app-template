# Lefthook gate configuration.
# Docs: https://lefthook.dev/
#
# Philosophy: fast, diff-scoped hooks only. Full-repo sweeps belong in CI, not
# in the local commit/push path. Every command that requires an external tool
# uses the soft-skip pattern (command -v <tool> || exit 0) so a freshly-cloned
# environment without the full toolchain can still commit and push — the same
# gate runs as a hard failure in CI where the tool is always installed.
#
# Two stages:
#   pre-commit  — cheap, staged-file-scoped checks (format, lint, secret scan,
#                 doc validation, UBS staged). All run in parallel.
#   pre-push    — heavier gates (typecheck, tests, coverage, perf, sensors,
#                 versioning, UBS diff). All run in parallel against the diff
#                 between HEAD and the configured base ref (default: main).
#
# Base ref resolution (used by typecheck-affected, test-affected, ubs-diff,
# versioning-release-check):
#   git config harness.hookBaseRef    → branch name (e.g. main)
#   git config harness.hookBaseRemote → remote name (e.g. upstream)
#   Falls back to origin/main if neither is set.
#
# `scripts/init.ts` installs lefthook into .git/hooks and chains any global
# attribution prepare-commit-msg hook configured through core.hooksPath.

skip_output:
  - meta
  - skips

pre-commit:
  parallel: true
  commands:
    biome-format-lint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,css,scss,md,yml,yaml}"
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping biome format/lint hook" >&2
            exit 0
          fi
          pnpm exec biome check --write --files-ignore-unknown=true --no-errors-on-unmatched "$@"
        ' -- {staged_files}
      stage_fixed: true

    secret-scan:
      run: |
        sh -eu -c '
          if ! command -v gitleaks >/dev/null 2>&1; then
            printf "%s\n" "warning: gitleaks not found; skipping secret scan hook" >&2
            exit 0
          fi
          gitleaks protect --staged --redact --no-banner
        '

    doc-validator:
      glob: "*.{md,json}"
      # See pre-push doc-validator for the --exclude rationale.
      run: harness/doc-validator/bin/doc-validator --exclude /.git/ --exclude /.beads/ --exclude /.ntm/ --exclude /node_modules/ --exclude /target/ --exclude harness/doc-validator/target --exclude ws_apps/docs/out --exclude docs/harness-engineering/references/ --exclude /.claude/worktrees/ .

    python-ruff:
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run ruff check .
        '

    python-mypy:
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run mypy src
        '

    ubs-staged:
      run: |
        sh -eu -c '
          if ! command -v ubs >/dev/null 2>&1; then
            printf "%s\n" "warning: ubs not found; skipping ubs-staged hook" >&2
            exit 0
          fi
          mkdir -p .beads && ubs --staged --fail-on-error --beads-jsonl .beads/ubs-findings.jsonl
        '

    python-ruff-format:
      # Read-only ruff format check (mirror of biome-format-lint's
      # write-then-check posture, but non-mutating so the staged set is
      # not silently rewritten). Pairs with python-ruff (lint) above.
      glob: "ws_apps/example-python/**/*.py"
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run ruff format --check .
        '

pre-push:
  parallel: true
  commands:
    typecheck-affected:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping affected typecheck hook" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          pnpm turbo run typecheck --filter="...[$base]"
        '

    test-affected:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping affected test hook" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          pnpm turbo run test --filter="...[$base]"
        '

    cov-ts:
      run: |
        sh -eu -c '
          if ! command -v pnpm >/dev/null 2>&1; then
            printf "%s\n" "warning: pnpm not found; skipping TypeScript workspace coverage hook" >&2
            exit 0
          fi
          pnpm test:coverage
        '

    cov-rust:
      # Rust llvm-cov gate for template Rust surfaces. The hook soft-skips
      # when cargo-llvm-cov is absent locally; CI installs the tool and runs
      # the same `just cov-rust` recipe as the hard gate.
      run: |
        sh -eu -c '
          if ! command -v cargo >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo-llvm-cov not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          if ! command -v just >/dev/null 2>&1; then
            printf "%s\n" "warning: just not found; skipping Rust coverage hook" >&2
            exit 0
          fi
          just cov-rust
        '

    cov-py:
      # Python pytest-cov gate for ws_apps/example-python. The package keeps
      # its 100 percent threshold in pyproject.toml; this hook soft-skips
      # when uv is missing so first-clone pushes fail only once the Python
      # toolchain is present.
      run: |
        sh -eu -c '
          cd ws_apps/example-python
          sh scripts/with-uv.sh uv run pytest
        '

    doc-validator:
      # Excludes (re-listing the validator defaults explicitly because
      # passing --exclude REPLACES the default list rather than adding
      # to it):
      #   - /.git/ /.beads/ /.ntm/ /node_modules/ /target/
      #     harness/doc-validator/target ws_apps/docs/out: vendor + state
      #     paths the validator's own default-list skips.
      #   - docs/harness-engineering/references/: vendored extractive
      #     summaries from neural-hermes-data carry footnote-style
      #     anchors (#footnote-N, #footnote-ref-N-N) the validator does
      #     not yet understand. Preservation-first: the content is
      #     intentionally verbatim, so scope the gate around it rather
      #     than rewriting the vendored material.
      #   - /.claude/worktrees/: ephemeral git worktrees; broken relative
      #     links in a worktree are not part of the main-tree surface.
      run: harness/doc-validator/bin/doc-validator --exclude /.git/ --exclude /.beads/ --exclude /.ntm/ --exclude /node_modules/ --exclude /target/ --exclude harness/doc-validator/target --exclude ws_apps/docs/out --exclude docs/harness-engineering/references/ --exclude /.claude/worktrees/ .

    perf-gate:
      # Startup-time fitness function (bead create-harness-app-n48.13).
      # Runs hyperfine against ws_apps/example-typescript's cold-start
      # path and compares the mean against harness/perf/baseline.json.
      # Soft-skips when hyperfine is missing (bench.sh emits a no-op
      # JSON sentinel that the gate treats as "no benchmarks this run").
      run: harness/perf/bench.sh | node harness/perf/gate.mjs

    sensors-gate:
      # APSS 8-dimension architectural fitness gate (bead
      # create-harness-app-2zz). Wraps harness/sensors/bin/sensors gate,
      # which runs the cruiser + ts-morph + APSS topology pipeline and
      # checks for regressions against harness/sensors/baseline.json.
      # Enforced metrics on MT01 + MD01 will fail this hook on any
      # per-folder I or D regression and on cognitive / cyclomatic /
      # fan-out / main-sequence-distance / instability-range regressions.
      # Advisory dimensions (ST01, SC01, LG01, AC01, PF01, AV01) report
      # but never fail. The hook itself soft-skips when node or npx is
      # missing so a freshly-cloned environment without those installed
      # can still commit and push.
      run: |
        sh -eu -c '
          if ! command -v node >/dev/null 2>&1; then
            printf "%s\n" "warning: node not found; skipping sensors fitness gate" >&2
            exit 0
          fi
          if ! command -v npx >/dev/null 2>&1; then
            printf "%s\n" "warning: npx not found; skipping sensors fitness gate" >&2
            exit 0
          fi
          harness/sensors/bin/sensors gate
        '

    versioning-release-check:
      # Mirrors the GitHub Actions versioning workflow. Uses the same
      # just release-check recipe, scoped to commits ahead of the
      # configured base ref, and soft-skips when the local versioning
      # toolchain is not present.
      run: |
        sh -eu -c '
          if ! command -v cargo >/dev/null 2>&1; then
            printf "%s\n" "warning: cargo not found; skipping versioning release check" >&2
            exit 0
          fi
          if ! command -v bun >/dev/null 2>&1; then
            printf "%s\n" "warning: bun not found; skipping versioning release check" >&2
            exit 0
          fi
          if ! command -v just >/dev/null 2>&1; then
            printf "%s\n" "warning: just not found; skipping versioning release check" >&2
            exit 0
          fi
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf origin)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base=""
          if [ -n "$base" ]; then
            if [ "$(git rev-list --count "$base..HEAD")" -eq 0 ]; then
              printf "%s\n" "versioning release check: no commits ahead of $base"
              exit 0
            fi
            just release-check "$base" HEAD
          else
            just release-check
          fi
        '

    ubs-diff:
      run: |
        sh -eu -c '
          base_ref="$(git config harness.hookBaseRef || git config harness.upstreamRef || printf main)"
          base_remote="$(git config harness.hookBaseRemote || printf upstream)"
          base="$base_remote/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/$base_ref"
          git rev-parse --verify "$base" >/dev/null 2>&1 || base="origin/main"
          mkdir -p .beads
          ubs --diff "$base" --fail-on-error --beads-jsonl .beads/ubs-findings.jsonl
        '
